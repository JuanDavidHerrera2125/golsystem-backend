spring.application.name=GOLSYSTEM

# ===============================
# SERVER
# ===============================
# Mantenemos el puerto que usabas en el error anterior
server.port=8080

# ===============================
# DATABASE CONFIG (H2 for Development)
# ===============================
# Base de datos H2 en memoria para desarrollo sin instalar MySQL
spring.datasource.url=jdbc:h2:mem:golsystem;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# Dialecto para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# H2 CONSOLE (Optional - for debugging)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# TIMEZONE (Bogotï¿½, Colombia)
# ===============================
# Esto es excelente para que las fechas de tus partidos no se descuadren
spring.jackson.time-zone=America/Bogota
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# Subida de logos / fotos (multipart)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
