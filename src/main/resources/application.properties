# Configuración del DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/golsystemv?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# IMPORTANTE: NO agregues la línea de "database-platform" o "dialect"
spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita que Spring intente usar una DB en memoria si falla la principal
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# Configuración para subida de archivos
upload.path=uploads/
upload.base-url=/uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB